<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card">

                <div class="card-body">

                    <h3 class="text-center mb-4">
                        Iniciar Sesión
                    </h3>

                    <form method="POST">

                        <input
                            type="hidden"
                            name="csrf_token"
                            value="{{ csrf_token() }}">

                        <input
                            type="text"
                            name="usuario"
                            class="form-control mb-3"
                            placeholder="Usuario"
                            required>

                        <input
                            type="password"
                            name="password"
                            class="form-control mb-3"
                            placeholder="Contraseña"
                            required>

                        <button
                            class="btn btn-primary w-100">

                            Ingresar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
